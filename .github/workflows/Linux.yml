name: Linux
on:
  schedule:
    - cron: '10 9 * * *'
  workflow_dispatch:
  push:
    branches:
      - '*'
    paths:
      - '**.sh'
      - '.github/workflows/Linux.yml'
      - 'plat.conf'
  pull_request:
    branches:
      - '*'
    paths:
      - '**.sh'
      - '.github/workflows/Linux.yml'
      - 'plat.conf'

concurrency: 
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  Docker:
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu:latest", "debian:latest", "almalinux:latest", "fedora:latest", "opensuse/leap:latest", "alpine:latest", "oraclelinux:8", "kalilinux/kali", "archlinux:latest",  "gentoo/stage3", "tatsushid/tinycore"]
    runs-on: ubuntu-latest
    env:
      DEBUG: 1
      TEST_PREFERRED_CHAIN: (STAGING) Pretend Pear X1
      TEST_ACME_Server: "LetsEncrypt.org_test"
    steps:
    - uses: actions/checkout@v7
    - uses: anyvm-org/cf-tunnel@v0
      id: tunnel
      with:
        protocol: http
        port: 80
    - name: Set envs
      run: echo "TestingDomain=${{steps.tunnel.outputs.server}}" >> $GITHUB_ENV
    - name: Set CASE
      if: github.event_name == 'push'
      shell: bash
      env:
        HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
      run: |
        _case="$(printf '%s' "$HEAD_COMMIT_MSG" | tr ' \t' '\n\n' | grep '^CASE=le_test_' | head -1 | cut -d '=' -f 2- || true)"
        if [ -n "$_case" ]; then
          echo "CASE=$_case" >> "$GITHUB_ENV"
        fi
    - name: Run acmetest
      run: |
        ./rundocker.sh  testplat ${{ matrix.os }}
