name: MidnightBSD
on:
  schedule:
    - cron: '10 9 * * *'
  workflow_dispatch:
  push:
    branches:
      - '*'
    paths:
      - '**.sh'
      - '.github/workflows/MidnightBSD.yml'
  pull_request:
    branches:
      - '*'
    paths:
      - '**.sh'
      - '.github/workflows/MidnightBSD.yml'


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  MidnightBSD:
    strategy:
      matrix:
        release: [""]
    runs-on: ubuntu-latest
    env:
      TEST_PREFERRED_CHAIN: (STAGING) Pretend Pear X1
      TEST_ACME_Server: "LetsEncrypt.org_test"
    steps:
    - uses: actions/checkout@v7
    - uses: anyvm-org/cf-tunnel@v0
      id: tunnel
      with:
        protocol: http
        port: 8080
    - name: Set envs
      run: echo "TestingDomain=${{steps.tunnel.outputs.server}}" >> $GITHUB_ENV
    - name: Set CASE
      if: github.event_name == 'push'
      shell: bash
      env:
        HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
      run: |
        _case="$(printf '%s' "$HEAD_COMMIT_MSG" | tr ' \t' '\n\n' | grep '^CASE=' | head -1 | cut -d '=' -f 2-)"
        if [ -n "$_case" ]; then
          echo "CASE=$_case" >> "$GITHUB_ENV"
        fi
    - uses: vmactions/midnightbsd-vm@v1
      with:
        envs: 'TestingDomain TEST_PREFERRED_CHAIN TEST_ACME_Server CASE'
        debug-on-error: ${{ vars.DEBUG_ON_ERROR }}
        nat: |
          "8080": "80"
        prepare: mport install socat curl || true
        usesh: true
        sync: nfs
        release: ${{ matrix.release }}
        run: ./letest.sh
