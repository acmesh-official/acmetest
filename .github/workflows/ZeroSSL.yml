name: ZeroSSL
on:
  schedule:
    - cron: '10 9 * * 5'
  workflow_dispatch:
  push:
    branches:
      - '*'
    paths:
      - '**.sh'
      - '.github/workflows/ZeroSSL.yml'
  pull_request:
    branches:
      - '*'
    paths:
      - '**.sh'
      - '.github/workflows/ZeroSSL.yml'



concurrency: 
  group: ${{ github.workflow }}
  cancel-in-progress: true



jobs:
  ZeroSSL:
    runs-on: ubuntu-latest
    env:
      TEST_ACME_Server: "ZeroSSL.com"
      CA_ECDSA: "ZeroSSL ECC DV SSL CA 2"
      CA: "ZeroSSL RSA DV SSL CA 2"
      CA_EMAIL: "githubtest@acme.sh"
      TEST_PREFERRED_CHAIN: ""
      QUICK_TEST: 1
    steps:
    - uses: actions/checkout@v7
    - uses: anyvm-org/cf-tunnel@v0
      id: tunnel
      with:
        protocol: http
        port: 80
    - name: Set envs
      run: echo "TestingDomain=${{steps.tunnel.outputs.server}}" >> $GITHUB_ENV
    - name: Set CASE
      if: github.event_name == 'push'
      shell: bash
      env:
        HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
      run: |
        _case="$(printf '%s' "$HEAD_COMMIT_MSG" | tr ' \t' '\n\n' | grep '^CASE=le_test_' | head -1 | cut -d '=' -f 2- || true)"
        if [ -n "$_case" ]; then
          echo "CASE=$_case" >> "$GITHUB_ENV"
        fi
    - name: Run Test
      run: |
          sudo apt-get update && sudo apt-get install -y curl socat && \
          cd ../acmetest && sudo --preserve-env ./letest.sh


